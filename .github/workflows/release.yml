name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build workflows
        run: python3 scripts/build.py

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.json
          generate_release_notes: true
